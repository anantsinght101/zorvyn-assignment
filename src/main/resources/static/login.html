<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Zorvyn</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0d1f35;
      --navy-light: #152b47;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --white: #f5f2ec;
      --muted: #8a9ab0;
      --error: #e05c5c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* LEFT PANEL */
    .left {
      background: var(--navy-light);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      border-right: 1px solid rgba(201, 168, 76, 0.15);
      position: relative;
      overflow: hidden;
    }

    .left::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
      top: -100px; left: -100px;
    }

    .left::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.05) 0%, transparent 70%);
      bottom: -80px; right: -80px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 60px;
      position: relative;
      z-index: 1;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg { width: 20px; height: 20px; fill: var(--navy); }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--white);
      letter-spacing: 0.5px;
    }

    .tagline {
      font-family: 'DM Serif Display', serif;
      font-size: 2.6rem;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .tagline span { color: var(--gold); }

    .sub {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
      max-width: 360px;
      position: relative;
      z-index: 1;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--gold);
      margin: 30px 0;
      position: relative;
      z-index: 1;
    }

    /* RIGHT PANEL */
    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    .form-box {
      width: 100%;
      max-width: 380px;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      color: var(--white);
      margin-bottom: 6px;
    }

    .form-sub {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 36px;
    }

    .form-sub a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input {
      width: 100%;
      background: var(--navy-light);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    input:focus {
      border-color: var(--gold);
    }

    input::placeholder { color: rgba(138,154,176,0.5); }

    .btn {
      width: 100%;
      padding: 15px;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.1s;
      margin-top: 6px;
    }

    .btn:hover { background: var(--gold-light); }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: rgba(224, 92, 92, 0.1);
      border: 1px solid rgba(224, 92, 92, 0.3);
      color: var(--error);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
    }

    .success-msg {
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold-light);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
    }

    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .left { display: none; }
      .right { padding: 40px 24px; }
    }
  </style>
</head>
<body>

  <div class="left">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <span class="brand-name">Zorvyn</span>
    </div>
    <h1 class="tagline">Financial<br>control, <span>clearly</span><br>structured.</h1>
    <div class="divider"></div>
    <p class="sub">A secure backend system for managing financial records, tracking transactions, and deriving actionable insights — built for teams that need clarity over their data.</p>
  </div>

  <div class="right">
    <div class="form-box">
      <h2 class="form-title">Welcome back</h2>
      <p class="form-sub">Don't have an account? <a href="signup.html">Sign up</a></p>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />

      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />

      <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
    </div>
  </div>

  <script>
    // If already logged in, redirect
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!email || !password) {
        showError('Please fill in all fields.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const response = await fetch('/users/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.message || 'Invalid email or password.');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('email', email);

        successMsg.textContent = 'Login successful! Redirecting...';
        successMsg.style.display = 'block';

        setTimeout(() => window.location.href = 'dashboard.html', 1000);

      } catch (err) {
        showError('Could not connect to server. Make sure the backend is running.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
